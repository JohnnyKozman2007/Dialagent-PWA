name: my_restaurant_app
description: A restaurant management PWA with Firebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  cloud_functions: ^4.6.0          # <-- CORRECT package

  go_router: ^13.0.1
  flutter_riverpod: ^2.4.9
  equatable: ^2.0.5
  intl: ^0.18.1
  flutter_dotenv: ^5.1.0
  qr_flutter: ^4.1.0
  crypto: ^3.0.3
  universal_html: ^2.2.4
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
