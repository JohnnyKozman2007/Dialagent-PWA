name: my_restaurant_app
description: A restaurant management PWA with Firebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase – compatible versions (as of June 2026)
  firebase_core: ^3.15.2        # was ^2.32.0 – bumped
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  cloud_functions: ^5.1.3

  # Routing & State
  go_router: ^14.6.1
  flutter_riverpod: ^2.6.1

  # UI & Helpers
  equatable: ^2.0.5
  intl: ^0.19.0
  flutter_dotenv: ^5.2.1

  # 2FA (TOTP)
  qr_flutter: ^4.1.0
  crypto: ^3.0.3
  base32: ^2.1.3              # added

  # Web specific
  universal_html: ^2.2.4

  # PWA support
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
